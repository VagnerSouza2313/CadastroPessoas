<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pessoas</title>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f7;
            margin: 0;
            padding: 40px 20px;
            color: #1d1d1f;
        }

        h1 {
            text-align: center;
            font-weight: 600;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            background: #ffffff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            text-align: left;
            font-size: 13px;
            color: #6e6e73;
            font-weight: 500;
            padding-bottom: 15px;
        }

        tbody tr {
            border-top: 1px solid #e5e5e7;
            transition: 0.2s;
        }

        tbody tr:hover {
            background: #fafafa;
        }

        td {
            padding: 14px 8px;
            font-size: 14px;
        }

        ul {
            margin: 0;
            padding-left: 15px;
        }

        li {
            font-size: 13px;
            color: #6e6e73;
        }

        /* BOTÕES estilo Apple */
        .actions a {
            text-decoration: none;
            font-size: 13px;
            margin-right: 10px;
            color: #0071e3;
            font-weight: 500;
            transition: 0.2s;
        }

        .actions a:hover {
            opacity: 0.6;
        }

        /* botão delete mais discreto */
        .btn-delete {
            color: #ff3b30;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>Pessoas</h1>

    <table>
        <thead>
        <tr>
            <th>Id</th>
            <th>Nome</th>
            <th>Email</th>
            <th>Status</th>
            <th>Atividades</th>
            <th></th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="pessoa : ${pessoas}">
            <td th:text="${pessoa.id}"></td>
            <td th:text="${pessoa.nome}"></td>
            <td th:text="${pessoa.email}"></td>
            <td th:text="${pessoa.statusSocial}"></td>

            <td>
                <ul>
                    <li th:each="atividade : ${pessoa.atividades}"
                        th:text="${atividade.atividade + ' • Grau ' + atividade.grau}">
                    </li>
                </ul>
            </td>

            <td class="actions">
                <a th:href="@{/pessoas/ui/detalhes/{id}(id=${pessoa.id})}">Ver</a>
                <a th:href="@{/pessoas/ui/editar/{id}(id=${pessoa.id})}">Editar</a>
                <a class="btn-delete"
                   th:href="@{/pessoas/ui/deletarID/{id}(id=${pessoa.id})}">
                    Excluir
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
